<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FluxLight</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>FluxLight</h1>
        <p>Sistema de Iluminação Inteligente</p>
      </div>
      <div class="status-badge" id="appStatus">Pronto</div>
    </header>

    <main class="grid">
      <section class="panel hero">
        <h2>Controlo Geral</h2>
        <p>Gerir todas as lâmpadas Shelly RGBW em simultâneo.</p>

        <div class="actions">
          <button class="btn primary" onclick="apiLigarTodas()">Ligar todas</button>
          <button class="btn danger" onclick="apiDesligarTodas()">Desligar todas</button>
        </div>

        <div class="control-block">
          <label for="globalColor">Cor geral</label>
          <input type="color" id="globalColor" value="#ffffff" />
          <button class="btn secondary" onclick="apiCorTodas()">Aplicar cor</button>
        </div>

        <div class="control-block">
          <label for="globalBrightness">Brilho geral</label>
          <input type="range" id="globalBrightness" min="1" max="100" value="50" />
          <span id="brightnessValue">50%</span>
          <button class="btn secondary" onclick="apiBrilhoTodas()">Aplicar brilho</button>
        </div>
      </section>

      <section class="panel">
        <h2>Lâmpadas Individuais</h2>
        <div class="lamp-grid" id="lampGrid"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
